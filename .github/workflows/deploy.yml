name: Deploy SkillForge to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Move into the client folder where package.json actually lives
      - name: Install Dependencies
        run: |
          cd SkillForge/client
          npm install

      # 2. Run the build inside the client folder
      - name: Build Project
        run: |
          cd SkillForge/client
          npm run build

      # 3. Deploy the dist folder created inside client
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: SkillForge/client/dist
          branch: gh-pages